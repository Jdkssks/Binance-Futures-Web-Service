<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>幣安期貨技術指標查詢</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background:#121212; color:#e0e0e0; margin:20px; }
        h2 { text-align:center; color:#ffcc00; }
        .controls { display:flex; justify-content:center; gap:10px; margin-bottom:15px; }
        input, select, button { padding:8px; border-radius:4px; border:none; }
        button { background:#ffcc00; color:#000; cursor:pointer; }
        table { border-collapse:collapse; margin-top:20px; width:100%; }
        th, td { border:1px solid #444; padding:8px; text-align:center; }
        th { background:#333; }
        #chartContainer { width:100%; margin-top:20px; }
    </style>
</head>
<body>
    <h2>幣安期貨技術指標查詢</h2>

    <div class="controls">
        <input list="symbols" id="searchBox" placeholder="輸入或選擇標的">
        <datalist id="symbols">
            {% for s in symbols %}
                <option value="{{ s }}">
            {% endfor %}
        </datalist>
        <select id="interval">
            <option value="15m">15m</option>
            <option value="1h" selected>1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
        </select>
        <button onclick="querySignal()">查詢</button>
        <label><input type="checkbox" id="autoRefresh"> 自動刷新 (30秒)</label>
    </div>

    <div id="result"></div>
    <div id="chartContainer"></div>

    <script>
        let refreshTimer;

        function querySignal() {
            const symbol = document.getElementById("searchBox").value.trim().toUpperCase();
            const interval = document.getElementById("interval").value;
            if (!symbol) {
                alert("請輸入或選擇標的，例如 BTCUSDT");
                return;
            }
            fetch(`/signal?symbol=${symbol}&interval=${interval}`)
                .then(res => res.json())
                .then(data => {
                    // 顯示指標表格
                    let html = "<h3>查詢結果</h3><table><tr><th>指標</th><th>數值</th></tr>";
                    for (const key in data) {
                        if (key !== "Klines") {
                            html += `<tr><td>${key}</td><td>${Array.isArray(data[key]) ? data[key].join(", ") : data[key]}</td></tr>`;
                        }
                    }
                    html += "</table>";
                    document.getElementById("result").innerHTML = html;

                    // K 線 + 成交量
                    const klines = data.Klines;
                    const traceCandle = {
                        x: klines.map(k => new Date(k.timestamp)),
                        open: klines.map(k => k.open),
                        high: klines.map(k => k.high),
                        low: klines.map(k => k.low),
                        close: klines.map(k => k.close),
                        type: 'candlestick',
                        name: symbol,
                        increasing: {line: {color: 'green'}},
                        decreasing: {line: {color: 'red'}}
                    };

                    const traceVolume = {
                        x: klines.map(k => new Date(k.timestamp)),
                        y: klines.map(k => k.volume),
                        type: 'bar',
                        name: 'Volume',
                        marker: {color: 'rgba(200,200,200,0.5)'},
                        yaxis: 'y2'
                    };

                    const layout = {
                        grid: {rows: 2, columns: 1, pattern: 'independent'},
                        roworder: 'top to bottom',
                        paper_bgcolor: '#121212',
                        plot_bgcolor: '#121212',
                        font: {color: '#e0e0e0'},
                        xaxis: {rangeslider: {visible: false}},
                        yaxis: {title: 'Price'},
                        yaxis2: {title: 'Volume'}
                    };

                    Plotly.newPlot('chartContainer', [traceCandle, traceVolume], layout);
                })
                .catch(err => {
                    document.getElementById("result").innerHTML = `<p style="color:red;">錯誤：${err.message}</p>`;
                });
        }

        document.getElementById("autoRefresh").addEventListener("change", function() {
            if (this.checked) {
                refreshTimer = setInterval(querySignal, 30000);
            } else {
                clearInterval(refreshTimer);
            }
        });
    </script>
</body>
</html>
