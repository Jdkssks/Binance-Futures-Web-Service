<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Binance Futures Web Service</title>
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <h1 class="mb-4 text-center">幣安期貨技術指標查詢</h1>

    <form id="form" class="d-flex justify-content-center mb-4">
      <select id="symbol" class="form-select w-auto me-2">
        <option value="BTCUSDT">BTCUSDT</option>
        <option value="ETHUSDT">ETHUSDT</option>
        <option value="BNBUSDT">BNBUSDT</option>
        <option value="PIPPINUSDT">PIPPINUSDT</option>
      </select>
      <button type="submit" class="btn btn-primary">查詢</button>
    </form>

    <div class="card">
      <div class="card-header">查詢結果</div>
      <div class="card-body">
        <table class="table table-bordered table-striped">
          <thead>
            <tr>
              <th>指標</th>
              <th>數值</th>
            </tr>
          </thead>
          <tbody id="result-table">
            <!-- 查詢結果會插入在這裡 -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("form").addEventListener("submit", async function(e) {
      e.preventDefault();
      const symbol = document.getElementById("symbol").value;
      const res = await fetch(`/signal?symbol=${symbol}`);
      const data = await res.json();

      const tbody = document.getElementById("result-table");
      tbody.innerHTML = ""; // 清空舊資料

      // 把 JSON 的 key-value 轉成表格列
      for (const [key, value] of Object.entries(data)) {
        const row = document.createElement("tr");
        const cellKey = document.createElement("td");
        const cellValue = document.createElement("td");
        cellKey.textContent = key;
        cellValue.textContent = value;
        row.appendChild(cellKey);
        row.appendChild(cellValue);
        tbody.appendChild(row);
      }
    });
  </script>
</body>
</html>
