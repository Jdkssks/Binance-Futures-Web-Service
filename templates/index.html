<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>幣安期貨技術指標查詢</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #searchBox { padding: 5px; width: 250px; }
        button { padding: 5px 10px; margin-left: 10px; }
        table { border-collapse: collapse; margin-top: 20px; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>幣安期貨技術指標查詢</h2>

    <!-- 搜尋框 + autocomplete -->
    <input list="symbols" id="searchBox" placeholder="輸入或選擇標的">
    <datalist id="symbols">
        {% for s in symbols %}
            <option value="{{ s }}">
        {% endfor %}
    </datalist>
    <button onclick="querySignal()">查詢</button>

    <!-- 查詢結果 -->
    <div id="result"></div>

    <script>
        function querySignal() {
            const symbol = document.getElementById("searchBox").value.trim().toUpperCase();
            if (!symbol) {
                alert("請輸入或選擇標的，例如 BTCUSDT");
                return;
            }
            fetch(`/signal?symbol=${symbol}`)
                .then(res => {
                    if (!res.ok) throw new Error("查詢失敗");
                    return res.json();
                })
                .then(data => {
                    let html = "<h3>查詢結果</h3><table><tr><th>指標</th><th>數值</th></tr>";
                    for (const key in data) {
                        html += `<tr><td>${key}</td><td>${Array.isArray(data[key]) ? data[key].join(", ") : data[key]}</td></tr>`;
                    }
                    html += "</table>";
                    document.getElementById("result").innerHTML = html;
                })
                .catch(err => {
                    document.getElementById("result").innerHTML = `<p style="color:red;">錯誤：${err.message}</p>`;
                });
        }
    </script>
</body>
</html>
