<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>幣安期貨技術指標查詢</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #searchBox { margin-bottom: 10px; padding: 5px; width: 250px; }
        #symbolSelect { padding: 5px; width: 250px; }
        button { padding: 5px 10px; margin-left: 10px; }
        table { border-collapse: collapse; margin-top: 20px; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h2>幣安期貨技術指標查詢</h2>

    <!-- 搜尋框 -->
    <input type="text" id="searchBox" placeholder="搜尋標的...">

    <!-- 下拉選單 -->
    <select id="symbolSelect" name="symbol">
        {% for s in symbols %}
            <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
    </select>

    <button onclick="querySignal()">查詢</button>

    <!-- 查詢結果 -->
    <div id="result"></div>

    <script>
        // 搜尋功能：輸入文字篩選下拉選單
        const searchBox = document.getElementById("searchBox");
        const select = document.getElementById("symbolSelect");

        searchBox.addEventListener("keyup", function() {
            const filter = searchBox.value.toUpperCase();
            for (let i = 0; i < select.options.length; i++) {
                const txt = select.options[i].text.toUpperCase();
                select.options[i].style.display = txt.includes(filter) ? "" : "none";
            }
        });

        // 查詢 API
        function querySignal() {
            const symbol = select.value;
            fetch(`/signal?symbol=${symbol}`)
                .then(res => res.json())
                .then(data => {
                    let html = "<h3>查詢結果</h3><table><tr><th>指標</th><th>數值</th></tr>";
                    for (const key in data) {
                        html += `<tr><td>${key}</td><td>${Array.isArray(data[key]) ? data[key].join(", ") : data[key]}</td></tr>`;
                    }
                    html += "</table>";
                    document.getElementById("result").innerHTML = html;
                });
        }
    </script>
</body>
</html>
