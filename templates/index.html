<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>幣安期貨技術指標查詢</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #searchBox, #interval { padding: 5px; margin-right: 10px; }
        button { padding: 5px 10px; }
        table { border-collapse: collapse; margin-top: 20px; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background-color: #f2f2f2; }
        #chartContainer { width: 100%; height: 400px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>幣安期貨技術指標查詢</h2>

    <!-- 搜尋框 + autocomplete + 週期選擇 -->
    <input list="symbols" id="searchBox" placeholder="輸入或選擇標的">
    <datalist id="symbols">
        {% for s in symbols %}
            <option value="{{ s }}">
        {% endfor %}
    </datalist>
    <select id="interval">
        <option value="15m">15m</option>
        <option value="1h" selected>1h</option>
        <option value="4h">4h</option>
        <option value="1d">1d</option>
    </select>
    <button onclick="querySignal()">查詢</button>
    <label><input type="checkbox" id="autoRefresh"> 自動刷新 (30秒)</label>

    <!-- 查詢結果 -->
    <div id="result"></div>
    <div id="chartContainer">
        <canvas id="priceChart"></canvas>
    </div>

    <script>
        let chart;
        let refreshTimer;

        function querySignal() {
            const symbol = document.getElementById("searchBox").value.trim().toUpperCase();
            const interval = document.getElementById("interval").value;
            if (!symbol) {
                alert("請輸入或選擇標的，例如 BTCUSDT");
                return;
            }
            fetch(`/signal?symbol=${symbol}&interval=${interval}`)
                .then(res => res.json())
                .then(data => {
                    // 顯示指標表格
                    let html = "<h3>查詢結果</h3><table><tr><th>指標</th><th>數值</th></tr>";
                    for (const key in data) {
                        if (key !== "Klines") {
                            html += `<tr><td>${key}</td><td>${Array.isArray(data[key]) ? data[key].join(", ") : data[key]}</td></tr>`;
                        }
                    }
                    html += "</table>";
                    document.getElementById("result").innerHTML = html;

                    // 畫 K 線圖
                    const klines = data.Klines.map(k => ({
                        x: new Date(k.timestamp),
                        o: k.open,
                        h: k.high,
                        l: k.low,
                        c: k.close
                    }));

                    if (chart) chart.destroy();
                    const ctx = document.getElementById("priceChart").getContext("2d");
                    chart = new Chart(ctx, {
                        type: 'candlestick',
                        data: { datasets: [{ label: symbol, data: klines }] },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: { x: { type: 'time', time: { unit: 'minute' } } }
                        }
                    });
                })
                .catch(err => {
                    document.getElementById("result").innerHTML = `<p style="color:red;">錯誤：${err.message}</p>`;
                });
        }

        // 自動刷新功能
        document.getElementById("autoRefresh").addEventListener("change", function() {
            if (this.checked) {
                refreshTimer = setInterval(querySignal, 30000); // 每30秒刷新
            } else {
                clearInterval(refreshTimer);
            }
        });
    </script>
</body>
</html>
